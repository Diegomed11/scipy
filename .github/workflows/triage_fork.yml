# Triaje NLP para TU FORK de SciPy — copiar a .github/workflows/triage.yml del fork.
# Al abrir un issue: trae el modelo desde tu repo NLP, predice el módulo y COMENTA el
# análisis en el issue (comentar es más visible que etiquetar y no necesita que existan
# los labels scipy.X en el fork, que no se copian al hacer fork).
name: NLP issue triage (demo)

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Traer el modelo NLP (tu repo)
        run: git clone --depth 1 https://github.com/Diegomed11/nlp_proyecto.git model

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencia (solo numpy)
        run: pip install numpy

      - name: Predecir el módulo
        working-directory: model
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          CONF_THRESHOLD: "0.5"
        run: python -m action.label_issue > "$GITHUB_WORKSPACE/pred.json"; cat "$GITHUB_WORKSPACE/pred.json"

      - name: Comentar el análisis en el issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pred = JSON.parse(fs.readFileSync('pred.json', 'utf8'));
            const top = pred.top_suggestions
              .map(s => `\`${s.module}\` (${(s.confidence * 100).toFixed(0)}%)`)
              .join(', ');
            const body = [
              '🤖 **Triaje automático (NLP)**',
              '',
              `Módulo(s) probable(s): ${top}`,
              '',
              '_Predicción de un baseline TF-IDF + regresión logística entrenado sobre ' +
              'issues históricos de SciPy. Es un asistente: confirma o corrige._',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
